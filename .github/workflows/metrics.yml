name: Metrics
on:
  schedule: [{cron: "0 */8 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Konfigurasi Tampilan Utama
          user: FelliAs
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          theme: tokyonight

          # 1. Plugin Bahasa Pemrograman (Bawaan Metrics)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes

          # 2. Plugin Isocalendar (Menggantikan kartu Vercel)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Menampilkan jejak komit setengah tahun terakhir

          # 3. Plugin AniList (Menampilkan hobi anime/manga kamu)
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga    # Menampilkan anime dan manga
          plugin_anilist_sections: favorites, watching, reading # Kategori yang ingin ditampilkan
          plugin_anilist_limit: 5                # Batasi maksimal 5 item agar tidak terlalu panjang
          plugin_anilist_user: FelliAs           # Pastikan username AniList kamu benar di sini
