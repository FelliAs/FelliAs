name: Metrics
on:
  schedule: [{cron: "0 */8 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  # 1. Kotak Kiri Atas: Stats Utama & Languages
  github-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-stats.svg
          user: FelliAs
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          theme: tokyonight
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes

  # 2. Kotak Kanan Atas: Isocalendar
  github-isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-isocalendar.svg
          user: FelliAs
          template: classic
          base: "" # Mengosongkan stats utama agar hanya menampilkan kalender saja
          config_timezone: Asia/Jakarta
          theme: tokyonight
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

  # 3. Kotak Bawah Tengah: AniList
  github-anilist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-anilist.svg
          user: FelliAs
          template: classic
          base: "" # Mengosongkan stats utama agar hanya menampilkan anilist saja
          config_timezone: Asia/Jakarta
          theme: tokyonight
          plugin_anilist: yes
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 5
          plugin_anilist_user: Sayriii
